<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Compatibility 💖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>💘 Love Compatibility</h1>

    <form id="loveForm">
      <input 
        type="text" 
        id="name1" 
        placeholder="Your Name" 
        autocomplete="off"
        required
      >

      <input 
        type="text" 
        id="name2" 
        placeholder="Crush Name" 
        autocomplete="off"
        required
      >

      <button type="submit">
        Check Compatibility 💞
      </button>
    </form>

    <div id="result" class="result-box"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
